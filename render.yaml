services:
  - type: web
    name: exan-dashboard
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: APP_USERNAME
        value: admin
      - key: APP_PASSWORD
        value: admin123
